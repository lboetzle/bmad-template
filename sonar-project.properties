# SonarQube project configuration — generated by install.py
# Run scanner:
#   bash scripts/run_sonar_pipeline.sh
#
# Or manually:
#   docker run --rm --network host \
#     -e SONAR_HOST_URL=http://localhost:9000 \
#     -e SONAR_TOKEN=<token> \
#     -v "$(pwd):/usr/src" sonarsource/sonar-scanner-cli

sonar.projectKey={{PROJECT_SLUG}}
sonar.projectName={{PROJECT_NAME}}

# Source and test paths
sonar.sources=src/{{PROJECT_SLUG}}
sonar.tests=tests

# Python version
sonar.python.version=3.11

# Coverage report (generated by: pytest --cov=src/{{PROJECT_SLUG}} --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=**/migrations/**,tests/spikes/**

# External issue reports (ruff + mypy)
sonar.externalIssuesReportPaths=ruff-sonar.json,mypy-sonar.json

sonar.sourceEncoding=UTF-8
