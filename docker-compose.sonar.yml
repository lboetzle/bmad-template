# docker-compose.sonar.yml — SonarQube CE + PostgreSQL
# SEPARATE from docker-compose.yml (trading daemon)
# Run: docker compose -f docker-compose.sonar.yml up -d
# Stop: docker compose -f docker-compose.sonar.yml down

services:
  sonarqube-db:
    image: postgres:15
    container_name: sonarqube-db
    restart: unless-stopped
    environment:
      # Local-only DevOps service — plain credentials acceptable (not deployed to VPS)
      POSTGRES_DB: sonar
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
    volumes:
      - sonar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  sonarqube:
    image: sonarqube:lts-community
    container_name: sonarqube
    restart: unless-stopped
    depends_on:
      sonarqube-db:
        condition: service_healthy
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      # Web JVM memory
      SONAR_WEB_JAVAADDITIONALOPTS: "-Xms128m -Xmx256m"
      # Elasticsearch JVM memory (AC #4: reasonable limits)
      ES_JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
      - sonar_extensions:/opt/sonarqube/extensions
    ports:
      # Port 9000 — no conflict with existing docker-compose.yml (port 8080)
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  sonar_pg_data:
  sonar_data:
  sonar_logs:
  sonar_extensions:
